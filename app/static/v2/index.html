<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DESKCHALK</title>
  <link rel="stylesheet" href="/static/v2/app.css">
</head>
<body class="dc-app">

  <!-- Desktop left rail -->
  <nav class="dc-rail">
    <a class="dc-rail-logo" href="#" id="logo-link">
      <img src="/static/v2/deskchalk-mark.svg" alt="DeskChalk" width="34" height="34">
    </a>
    <div class="dc-rail-items">
      <button class="dc-rail-btn is-active" data-view="overview">
        <i data-lucide="layout-dashboard"></i>
        <span>Overview</span>
      </button>

      <div class="dc-rail-div"></div>

      <button class="dc-rail-btn" data-view="maps">
        <i data-lucide="map"></i>
        <span>Maps</span>
      </button>

      <div class="dc-rail-div"></div>

      <!-- External accounts — each appears only once it's configured. -->
      <a class="dc-rail-btn" id="rail-faceit" href="#" target="_blank" rel="noopener" title="Your FACEIT profile" style="display:none">
        <i data-lucide="user-round"></i>
        <span>FACEIT</span>
      </a>
      <a class="dc-rail-btn" id="rail-account" href="#" target="_blank" rel="noopener" title="Your Steam profile" style="display:none">
        <i data-lucide="gamepad-2"></i>
        <span>Steam</span>
      </a>
      <button class="dc-rail-btn is-setup" id="rail-addacct" title="Connect FACEIT or matchmaking" style="display:none">
        <i data-lucide="user-plus"></i>
        <span>Connect</span>
      </button>

      <div class="dc-rail-div"></div>

      <!-- Project links -->
      <a class="dc-rail-btn" id="rail-github" href="https://github.com/verybusyowl/deskchalk" target="_blank" rel="noopener" title="Source on GitHub">
        <i data-lucide="github"></i>
        <span>GitHub</span>
      </a>
      <a class="dc-rail-btn is-coffee" id="rail-coffee" href="https://www.buymeacoffee.com/verybusyowl" target="_blank" rel="noopener" title="Buy me a coffee">
        <i data-lucide="coffee"></i>
        <span>Coffee</span>
      </a>
    </div>

    <!-- Settings: edit your .env from the app. Pinned to the bottom. -->
    <button class="dc-rail-btn dc-rail-settings" id="rail-settings" title="Settings — edit your config">
      <i data-lucide="settings"></i>
      <span>Settings</span>
    </button>
  </nav>

  <!-- Mobile sticky top bar -->
  <header class="dc-topbar">
    <div style="display:flex;align-items:center;gap:9px">
      <img src="/static/v2/deskchalk-mark.svg" alt="" width="28" height="28">
      <span style="font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--text-1);letter-spacing:.03em">DESK<span style="color:var(--orange)">.</span>CHALK</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="topbar-elo" style="display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13px;color:var(--orange);display:none">
        <i data-lucide="flame" style="width:14px;height:14px"></i>
        <span id="topbar-elo-val"></span>
      </span>
      <button class="dc-icon-btn" id="ask-open-top" aria-label="Ask the coach">
        <i data-lucide="message-square-text"></i>
      </button>
    </div>
  </header>

  <!-- Main content area -->
  <main class="dc-main">
    <div id="view-overview"></div>
    <div id="view-maps" style="display:none"></div>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="dc-bottomnav">
    <button class="dc-bn-btn is-active" data-view="overview">
      <i data-lucide="layout-dashboard"></i>
      <span>Overview</span>
    </button>
    <button class="dc-bn-btn" data-view="maps">
      <i data-lucide="map"></i>
      <span>Maps</span>
    </button>
    <button class="dc-bn-btn" id="ask-open-bot" style="color:var(--text-2)">
      <i data-lucide="message-square-text"></i>
      <span>Ask</span>
    </button>
  </nav>

  <!-- Ask-the-coach slide-over -->
  <div class="dc-scrim" id="ask-scrim"></div>
  <aside class="dc-slideover" id="ask-panel" aria-label="Ask the coach">
    <header class="dc-so-head">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="/static/v2/deskchalk-mark.svg" width="26" height="26" alt="">
        <div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);color:var(--text-1)">Ask the coach</div>
          <div class="dc-label" style="color:var(--mint)">● Reads your last 20 demos</div>
        </div>
      </div>
      <button class="dc-icon-btn" id="ask-close" aria-label="Close">
        <i data-lucide="x"></i>
      </button>
    </header>
    <div class="dc-so-body" id="ask-body"></div>
    <div class="dc-so-suggest" id="ask-suggest">
      <button class="dc-chip" data-q="What is my biggest weakness right now?">Biggest weakness?</button>
      <button class="dc-chip" data-q="What should I practice in aim trainer today?">Aim trainer today?</button>
      <button class="dc-chip" data-q="Explain my untraded-death problem">My untraded deaths</button>
      <button class="dc-chip" data-q="Give me a one-match focus for tonight">Tonight's focus</button>
    </div>
    <footer class="dc-so-foot">
      <input class="dc-input" id="ask-input" placeholder="Ask about a map, match, or habit…" autocomplete="off">
      <button class="dc-send" id="ask-send" aria-label="Send">
        <i data-lucide="arrow-up"></i>
      </button>
    </footer>
  </aside>

  <!-- Settings slide-over: edit a curated subset of .env from the app -->
  <aside class="dc-slideover" id="settings-panel" aria-label="Settings">
    <header class="dc-so-head">
      <div style="display:flex;align-items:center;gap:10px">
        <i data-lucide="settings" style="color:var(--mint)"></i>
        <div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);color:var(--text-1)">Settings</div>
          <div class="dc-label" style="color:var(--text-3)">Edits your .env — most changes apply on restart</div>
        </div>
      </div>
      <button class="dc-icon-btn" id="settings-close" aria-label="Close">
        <i data-lucide="x"></i>
      </button>
    </header>
    <div class="dc-so-body" id="settings-body"></div>
    <footer class="dc-so-foot">
      <button class="dc-send" id="settings-save" style="width:auto;padding:0 18px;gap:8px;font-family:var(--font-display);font-weight:700">Save</button>
      <span id="settings-status" class="dc-label" style="align-self:center;color:var(--text-3)"></span>
    </footer>
  </aside>

  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="/static/v2/app.js"></script>
</body>
</html>
