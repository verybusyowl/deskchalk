<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CS2 Companion</title>
<style>
:root {
  --bg:#0d0e11; --sf:#13141a; --sf2:#1a1b22; --sf3:#21222b;
  --bd:#26272f; --bd2:#33343e;
  --tx:#d8d8e0; --mu:#6a6a7a; --mu2:#8e8e9e;
  --orange:#e07828; --orange2:#f09040;
  --ct:#4e9ed4; --t:#d4804a;
  --green:#4aaa6a; --yellow:#c49020; --red:#c44040;
  --ac:#7aa2f7;
}
html[data-theme="light"] {
  --bg:#f0f0f4; --sf:#fff; --sf2:#f5f5f9; --sf3:#ececf1;
  --bd:#d0d0da; --bd2:#bcbcca;
  --tx:#18181e; --mu:#70708a; --mu2:#48485a;
  --orange:#b85814; --orange2:#d4701c;
  --ct:#1c68b0; --t:#a84e12;
  --green:#1e7a3e; --yellow:#8e6c00; --red:#a02828;
}
html[data-theme="faceit"] {
  --bg:#0e0e0e; --sf:#181818; --sf2:#222; --sf3:#2c2c2c;
  --bd:#2e2e2e; --bd2:#3c3c3c;
  --tx:#f0f0f0; --mu:#686868; --mu2:#989898;
  --orange:#ff5500; --orange2:#ff7733;
  --green:#34a854; --yellow:#c89a10; --red:#dc2c2c;
}
html[data-theme="leetify"] {
  --bg:#0b0d15; --sf:#121520; --sf2:#181c2c; --sf3:#1e2438;
  --bd:#242c44; --bd2:#2e3a58;
  --tx:#dde2f0; --mu:#4c566e; --mu2:#7c8aac;
  --orange:#00b4e0; --orange2:#22ccf8;
  --green:#30a868; --yellow:#b89a18; --red:#cc3c3c;
}
html[data-theme="hltv"] {
  --bg:#161616; --sf:#1e1e1e; --sf2:#282828; --sf3:#323232;
  --bd:#363636; --bd2:#464646;
  --tx:#e6dece; --mu:#626060; --mu2:#969090;
  --orange:#cc9810; --orange2:#e0ac18;
  --green:#429848; --yellow:#cc9810; --red:#b83838;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font:13px/1.6 'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh}

/* ── top bar ── */
.topbar {
  background: var(--sf);
  border-bottom: 1px solid var(--bd);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 44px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 700;
  color: var(--tx);
  text-decoration: none;
  flex-shrink: 0;
}
.topbar-brand .dot { color: var(--orange); }
.topbar-sep { color: var(--bd2); font-size: 16px; }
.topbar-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--mu2); }
.topbar-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.topbar select {
  background: var(--sf2);
  border: 1px solid var(--bd2);
  color: var(--tx);
  padding: 4px 8px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  outline: none;
}
.topbar select:focus { border-color: var(--orange); }
.updated-lbl { font-size: 10px; color: var(--mu); white-space: nowrap; }
.back-btn {
  font-size: 11px; font-weight: 600; color: var(--orange);
  text-decoration: none; padding: 4px 8px;
  border: 1px solid rgba(224,120,40,.3); border-radius: 4px;
  transition: all .15s; white-space: nowrap;
}
.back-btn:hover { background: rgba(224,120,40,.1); }

/* ── page body ── */
.page { max-width: 1400px; margin: 0 auto; padding: 16px 18px 40px; }

/* ── KPI strip ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.kpi-card {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-top: 3px solid var(--bd2);
  border-radius: 6px;
  padding: 10px 12px;
  transition: border-top-color .2s;
}
.kpi-card.good { border-top-color: var(--green); }
.kpi-card.warn { border-top-color: var(--yellow); }
.kpi-card.bad  { border-top-color: var(--red); }
.kpi-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--mu); margin-bottom: 4px; }
.kpi-val { font-size: 22px; font-weight: 800; color: var(--tx); line-height: 1; }
.kpi-sub { font-size: 10px; color: var(--mu); margin-top: 3px; }

/* ── two-column layout ── */
.main-grid {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 14px;
  align-items: start;
}

/* ── panel ── */
.panel {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 6px;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.panel-hdr {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--mu);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-hdr-accent { color: var(--orange); }

/* ── focus areas ── */
.focus-list { display: flex; flex-direction: column; gap: 8px; }
.focus-item {
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-left: 3px solid var(--bd2);
  border-radius: 5px;
  padding: 9px 12px;
}
.focus-item.rd { border-left-color: var(--red); }
.focus-item.yw { border-left-color: var(--yellow); }
.focus-item.gd { border-left-color: var(--green); }
.focus-item.ac { border-left-color: var(--ct); }
.focus-title { font-size: 12px; font-weight: 700; color: var(--tx); margin-bottom: 3px; }
.focus-tip { font-size: 11px; color: var(--mu2); line-height: 1.45; }
.focus-empty { font-size: 12px; color: var(--mu); font-style: italic; padding: 8px 0; }

/* ── stat comparison rows ── */
.stat-row-list { display: flex; flex-direction: column; gap: 6px; }
.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}
.stat-row-lbl { flex: 1; color: var(--mu2); }
.stat-row-bar-wrap { flex: 2; background: var(--sf2); border-radius: 2px; height: 4px; }
.stat-row-bar { height: 4px; border-radius: 2px; background: var(--orange); transition: width .4s; }
.stat-row-val { min-width: 40px; text-align: right; font-weight: 700; color: var(--tx); }
.stat-row-val.g { color: var(--green); }
.stat-row-val.y { color: var(--yellow); }
.stat-row-val.r { color: var(--red); }

/* ── coach brief ── */
.brief-scope-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--orange);
  background: rgba(224,120,40,.1);
  border: 1px solid rgba(224,120,40,.25);
  padding: 2px 8px;
  border-radius: 10px;
}
.brief-body { line-height: 1.7; font-size: 12px; color: var(--mu2); }
.brief-body h1,.brief-body h2,.brief-body h3 { font-size: 13px; font-weight: 700; color: var(--tx); margin: .9em 0 .3em; }
.brief-body p { margin: .45em 0; }
.brief-body ul,.brief-body ol { margin: .4em 0; padding-left: 18px; }
.brief-body li { margin: .25em 0; }
.brief-body strong { color: var(--orange2); }
.brief-body code { background: var(--sf2); padding: 2px 5px; border-radius: 4px; font-size: 10px; color: var(--green); }
.brief-ts { font-size: 10px; color: var(--mu); margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--bd); }
.no-brief { font-size: 11px; color: var(--mu); font-style: italic; padding: 8px 0; }
.refresh-btn {
  font-size: 10px; padding: 3px 9px; background: var(--sf2); border: 1px solid var(--bd2);
  color: var(--mu2); border-radius: 4px; cursor: pointer; transition: all .15s;
}
.refresh-btn:hover { color: var(--tx); border-color: var(--orange); }

/* ── grenade reference ── */
details.nade-section { margin-top: 4px; }
details.nade-section summary {
  font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
  color: var(--mu); cursor: pointer; padding: 10px 0; border-top: 1px solid var(--bd);
  list-style: none;
}
details.nade-section summary::before { content: '▶ '; font-size: 9px; }
details.nade-section[open] summary::before { content: '▼ '; }
.nade-type-group { margin-bottom: 20px; }
.nade-type-label { font-size: 12px; font-weight: 600; color: var(--tx); margin: 12px 0 8px; display: flex; align-items: center; gap: 7px; }
.nade-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.nade-dot.smoke   { background: #c8c8c8; }
.nade-dot.flash   { background: #f0e050; }
.nade-dot.molotov { background: #ff8c1e; }
.nade-dot.he      { background: #e05050; }
.lineup-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.lineup-thumb {
  background: var(--sf2); border: 1px solid var(--bd); border-radius: 6px;
  padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 136px;
}
.lineup-thumb canvas { border-radius: 4px; display: block; }
.count-badge { font-size: 11px; font-weight: 700; color: var(--tx); }
.nade-label { font-size: 10px; color: var(--mu); text-align: center; }
.no-lineups { font-size: 11px; color: var(--mu); font-style: italic; padding: 8px 0; }

/* ── responsive ── */
@media (max-width: 860px) {
  .main-grid { grid-template-columns: 1fr; }
  .kpi-strip { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 500px) {
  .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  .topbar-title { display: none; }
}
</style>

<!-- top bar -->
<div class="topbar">
  <a class="back-btn" href="/">&#8592; Analytics</a>
  <span class="topbar-sep">|</span>
  <span class="topbar-title">Coaching Companion</span>
  <div class="topbar-controls">
    <select id="mapSel"><option value="any">All maps</option></select>
    <select id="daysSel">
      <option value="7">7 days</option>
      <option value="30" selected>30 days</option>
      <option value="60">60 days</option>
      <option value="90">90 days</option>
    </select>
    <span class="updated-lbl" id="updatedAt"></span>
  </div>
</div>

<div class="page">

  <!-- KPI strip -->
  <div class="kpi-strip" id="kpiStrip">
    <div class="kpi-card" id="kc-win">
      <div class="kpi-lbl">Win %</div>
      <div class="kpi-val" id="kv-win">—</div>
      <div class="kpi-sub" id="ks-win"></div>
    </div>
    <div class="kpi-card" id="kc-kd">
      <div class="kpi-lbl">K / D</div>
      <div class="kpi-val" id="kv-kd">—</div>
      <div class="kpi-sub" id="ks-kd"></div>
    </div>
    <div class="kpi-card" id="kc-adr">
      <div class="kpi-lbl">ADR</div>
      <div class="kpi-val" id="kv-adr">—</div>
      <div class="kpi-sub"></div>
    </div>
    <div class="kpi-card" id="kc-hs">
      <div class="kpi-lbl">HS %</div>
      <div class="kpi-val" id="kv-hs">—</div>
      <div class="kpi-sub"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">Matches</div>
      <div class="kpi-val" id="kv-m">—</div>
      <div class="kpi-sub" id="ks-m"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">K — D</div>
      <div class="kpi-val" style="font-size:17px" id="kv-kd2">— / —</div>
      <div class="kpi-sub"></div>
    </div>
  </div>

  <!-- main two-column grid -->
  <div class="main-grid">

    <!-- LEFT: focus areas + performance breakdown -->
    <div>

      <div class="panel">
        <div class="panel-hdr">
          <span class="panel-hdr-accent">Pre-Session Focus</span>
        </div>
        <div class="focus-list" id="focusGrid">
          <div class="focus-empty">Loading…</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-hdr">Performance Breakdown</div>
        <div class="stat-row-list" id="perfBreakdown">
          <div style="color:var(--mu);font-size:11px">Loading…</div>
        </div>
      </div>

    </div>

    <!-- RIGHT: coach brief -->
    <div>

      <div class="panel">
        <div class="panel-hdr">
          <span>Coach Brief — Overview</span>
          <button class="refresh-btn" onclick="refreshBrief('overview')">↻ Refresh</button>
        </div>
        <div id="briefOverview"><div class="no-brief">Loading…</div></div>
      </div>

      <div class="panel" id="mapBriefPanel" style="display:none">
        <div class="panel-hdr">
          <span id="briefMapLabel">Coach Brief — Map</span>
          <button class="refresh-btn" id="refreshMapBtn" onclick="refreshBriefMap()">↻ Refresh</button>
        </div>
        <div id="briefMap"><div class="no-brief">Loading…</div></div>
      </div>

    </div>

  </div>

  <!-- Grenade reference (collapsible) -->
  <details class="nade-section">
    <summary>Grenade Reference</summary>
    <div id="nadeSection"><div class="no-lineups">Loading…</div></div>
  </details>

</div>

<script>
let _data = null;

// ── theme bridge ──────────────────────────────────────────────────────────────
(function(){
  const t = localStorage.getItem('cs2owl-theme') || 'dark';
  document.documentElement.dataset.theme = t === 'dark' ? '' : t;
})();

// ── fetch ─────────────────────────────────────────────────────────────────────
async function load() {
  const map  = document.getElementById('mapSel').value;
  const days = document.getElementById('daysSel').value;
  const res  = await fetch(`/api/companion_data?map=${encodeURIComponent(map)}&days=${days}`);
  _data = await res.json();
  render();
}

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  if (!_data) return;
  renderKpis(_data.kpis);
  populateMapSelector(_data.maps_available);
  renderFocusAreas(_data.focus_areas);
  renderPerfBreakdown(_data.kpis);
  renderBriefs(_data.coach_briefs);
  renderGrenades(_data.grenade_lineups);
}

// ── KPIs ─────────────────────────────────────────────────────────────────────
function sc(v, g, y) { return v==null?'':v>=g?'good':v>=y?'warn':'bad'; }
function fmt(v, d) { return v == null ? '—' : Number(v).toFixed(d); }

function renderKpis(k) {
  const set = (id, val, unit='') => {
    const el = document.getElementById(id);
    if (el) el.textContent = val != null ? val + unit : '—';
  };
  set('kv-win', fmt(k.win_pct, 1), '%');
  set('kv-kd',  fmt(k.kd, 2));
  set('kv-adr', fmt(k.adr, 0));
  set('kv-hs',  fmt(k.hs_pct, 1), '%');
  set('kv-m',   k.matches);

  const kills  = k.kills  != null ? k.kills  : '—';
  const deaths = k.deaths != null ? k.deaths : '—';
  document.getElementById('kv-kd2').textContent = `${kills} / ${deaths}`;

  // Sub-labels
  const ksM = document.getElementById('ks-m');
  if (ksM && k.matches) ksM.textContent = `${k.kills||0} kills`;

  // Color code
  const gradeCard = (cardId, v, g, y) => {
    const el = document.getElementById(cardId);
    if (!el || v == null) return;
    el.className = 'kpi-card ' + (v >= g ? 'good' : v >= y ? 'warn' : 'bad');
  };
  gradeCard('kc-win', k.win_pct, 55, 45);
  gradeCard('kc-kd',  k.kd,      1.1, 0.9);
  gradeCard('kc-adr', k.adr,     85,  70);
  gradeCard('kc-hs',  k.hs_pct,  50,  30);
}

// ── performance breakdown ─────────────────────────────────────────────────────
function renderPerfBreakdown(k) {
  const el = document.getElementById('perfBreakdown');
  if (!el || !k) return;
  const stats = [
    { label: 'Win Rate',     val: k.win_pct,  unit: '%', g: 55, y: 45, max: 100 },
    { label: 'K / D Ratio',  val: k.kd,       unit: '',  g: 1.1, y: 0.9, max: 2.5 },
    { label: 'ADR',          val: k.adr,       unit: '',  g: 85, y: 70,  max: 150 },
    { label: 'HS %',         val: k.hs_pct,   unit: '%', g: 50, y: 30,  max: 100 },
  ];
  el.innerHTML = stats.map(s => {
    const cls = s.val != null ? (s.val >= s.g ? 'g' : s.val >= s.y ? 'y' : 'r') : '';
    const pct = s.val != null ? Math.min(100, Math.round((s.val / s.max) * 100)) : 0;
    const barCol = cls === 'g' ? 'var(--green)' : cls === 'y' ? 'var(--yellow)' : 'var(--red)';
    return `<div class="stat-row">
      <span class="stat-row-lbl">${s.label}</span>
      <div class="stat-row-bar-wrap"><div class="stat-row-bar" style="width:${pct}%;background:${barCol}"></div></div>
      <span class="stat-row-val ${cls}">${s.val != null ? s.val + s.unit : '—'}</span>
    </div>`;
  }).join('');
}

// ── focus areas ───────────────────────────────────────────────────────────────
function renderFocusAreas(areas) {
  const el = document.getElementById('focusGrid');
  if (!areas || !areas.length) {
    el.innerHTML = '<div class="focus-empty">No focus areas to highlight — performance looks solid.</div>';
    return;
  }
  el.innerHTML = areas.map(a => `
    <div class="focus-item ${escHtml(a.color || 'ac')}">
      <div class="focus-title">${escHtml(a.title)}</div>
      <div class="focus-tip">${escHtml(a.tip)}</div>
    </div>`).join('');
}

// ── map selector ──────────────────────────────────────────────────────────────
function populateMapSelector(maps) {
  const sel = document.getElementById('mapSel');
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  (maps || []).forEach(m => sel.add(new Option(m, m)));
  if (cur && cur !== 'any') sel.value = cur;
}

// ── coach briefs ──────────────────────────────────────────────────────────────
function renderBriefs(briefs) {
  const selectedMap = document.getElementById('mapSel').value;
  const overview    = (briefs || []).find(b => b.scope === 'overview');
  const mapBrief    = selectedMap !== 'any' ? (briefs || []).find(b => b.scope === selectedMap) : null;

  const ovEl = document.getElementById('briefOverview');
  if (overview?.answer_html) {
    const ts = overview.generated_at ? new Date(overview.generated_at).toLocaleString() : '';
    ovEl.innerHTML = `
      <div style="margin-bottom:8px"><span class="brief-scope-pill">Overview</span></div>
      <div class="brief-body">${overview.answer_html}</div>
      ${ts ? `<div class="brief-ts">Generated ${ts}</div>` : ''}`;
  } else {
    ovEl.innerHTML = '<div class="no-brief">No brief cached yet. Click ↻ Refresh to generate one.</div>';
  }

  const mapPanel = document.getElementById('mapBriefPanel');
  const mapLabel = document.getElementById('briefMapLabel');
  const mapEl    = document.getElementById('briefMap');
  const mapBtn   = document.getElementById('refreshMapBtn');

  if (selectedMap === 'any') {
    mapPanel.style.display = 'none';
  } else {
    mapPanel.style.display = '';
    const clean = selectedMap.replace('de_','').toUpperCase();
    mapLabel.textContent = `Coach Brief — ${clean}`;
    if (mapBtn) mapBtn.dataset.map = selectedMap;
    if (mapBrief?.answer_html) {
      const ts = mapBrief.generated_at ? new Date(mapBrief.generated_at).toLocaleString() : '';
      mapEl.innerHTML = `
        <div style="margin-bottom:8px"><span class="brief-scope-pill">${escHtml(clean)}</span></div>
        <div class="brief-body">${mapBrief.answer_html}</div>
        ${ts ? `<div class="brief-ts">Generated ${ts}</div>` : ''}`;
    } else {
      mapEl.innerHTML = `<div class="no-brief">No cached brief for ${escHtml(clean)} yet. Click ↻ Refresh to generate one.</div>`;
    }
  }
}

async function refreshBrief(scope) {
  const el = scope === 'overview' ? document.getElementById('briefOverview') : document.getElementById('briefMap');
  el.innerHTML = '<div class="no-brief">Generating… (may take 15–30 s)</div>';
  try {
    await fetch(`/api/refresh_coach?scope=${scope}`, { method: 'POST' });
    await load();
  } catch(e) {
    el.innerHTML = '<div class="no-brief" style="color:var(--red)">Failed to generate brief.</div>';
  }
}

function refreshBriefMap() {
  const btn = document.getElementById('refreshMapBtn');
  const map = btn?.dataset.map || document.getElementById('mapSel').value;
  if (map && map !== 'any') refreshBrief(map);
}

// ── grenade reference ─────────────────────────────────────────────────────────
const NADE_COLORS = {
  smoke:   { dot: '#c8c8c8', land: '#d0d0d0', throw: '#5599dd' },
  flash:   { dot: '#f0e050', land: '#ffe040', throw: '#5599dd' },
  molotov: { dot: '#ff8c1e', land: '#ff6a00', throw: '#5599dd' },
  he:      { dot: '#e05050', land: '#cc2222', throw: '#5599dd' },
};
const NADE_ORDER = ['smoke', 'flash', 'molotov', 'he'];

function renderGrenades(lineups) {
  const el  = document.getElementById('nadeSection');
  const selectedMap = document.getElementById('mapSel').value;
  const filtered = (lineups || []).filter(l => selectedMap === 'any' || l.map === selectedMap);

  if (!filtered.length) {
    el.innerHTML = '<div class="no-lineups">No grenade lineup data for this selection (need ≥2 throws per cluster).</div>';
    return;
  }

  const byType = {};
  NADE_ORDER.forEach(t => { byType[t] = []; });
  filtered.forEach(l => { const t = l.grenade_type; if (!byType[t]) byType[t] = []; byType[t].push(l); });

  el.innerHTML = '';
  NADE_ORDER.forEach(nadeType => {
    const group = byType[nadeType];
    if (!group?.length) return;
    const groupEl = document.createElement('div');
    groupEl.className = 'nade-type-group';
    const typeName = nadeType.charAt(0).toUpperCase() + nadeType.slice(1);
    const label = document.createElement('div');
    label.className = 'nade-type-label';
    label.innerHTML = `<span class="nade-dot ${nadeType}"></span>${typeName}s <span style="color:var(--mu);font-weight:400;font-size:11px">(${group.length})</span>`;
    groupEl.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'lineup-grid';
    group.forEach(lineup => {
      const card = document.createElement('div');
      card.className = 'lineup-thumb';
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 120;
      card.appendChild(canvas);
      const badge = document.createElement('div');
      badge.className = 'count-badge';
      badge.textContent = `×${lineup.count}`;
      card.appendChild(badge);
      if (lineup.map && selectedMap === 'any') {
        const ml = document.createElement('div');
        ml.className = 'nade-label';
        ml.textContent = lineup.map.replace('de_','');
        card.appendChild(ml);
      }
      grid.appendChild(card);
      drawLineupThumb(canvas, lineup, nadeType);
    });
    groupEl.appendChild(grid);
    el.appendChild(groupEl);
  });
}

// ── calibration + thumb drawing ───────────────────────────────────────────────
const _calibCache = {};
async function getCalib(mapName) {
  if (_calibCache[mapName]) return _calibCache[mapName];
  try {
    const r = await fetch(`/api/radar_calibration?map=${encodeURIComponent(mapName)}`);
    if (!r.ok) throw new Error();
    _calibCache[mapName] = await r.json();
  } catch(e) {
    _calibCache[mapName] = { origin_x: -2500, origin_y: 2500, scale: 5 };
  }
  return _calibCache[mapName];
}

async function drawLineupThumb(canvas, lineup, nadeType) {
  const W = 120, H = 120;
  const calib = await getCalib(lineup.map || 'de_dust2');
  const { origin_x, origin_y, scale } = calib;
  const wPx = (wx, wy) => [(wx-origin_x)/scale, (origin_y-wy)/scale];
  const [tx,ty] = wPx(lineup.throw_x, lineup.throw_y);
  const [lx,ly] = wPx(lineup.land_x,  lineup.land_y);
  const margin = 20;
  const minX = Math.min(tx,lx), maxX = Math.max(tx,lx);
  const minY = Math.min(ty,ly), maxY = Math.max(ty,ly);
  const fitScale = Math.min((W-margin*2)/Math.max(maxX-minX,80), (H-margin*2)/Math.max(maxY-minY,80), 3.5);
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  const toCv = (px,py) => [W/2+(px-cx)*fitScale, H/2+(py-cy)*fitScale];
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#141824'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#262d3e'; ctx.lineWidth = 1;
  for (let g = -W; g < W*2; g += 40) { ctx.beginPath(); ctx.moveTo(g,0); ctx.lineTo(g,H); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,g); ctx.lineTo(W,g); ctx.stroke(); }
  const [ctxTx,ctxTy] = toCv(tx,ty), [ctxLx,ctxLy] = toCv(lx,ly);
  ctx.setLineDash([4,3]); ctx.strokeStyle = 'rgba(180,180,180,.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(ctxTx,ctxTy); ctx.lineTo(ctxLx,ctxLy); ctx.stroke(); ctx.setLineDash([]);
  const nc = NADE_COLORS[nadeType] || NADE_COLORS.smoke;
  ctx.fillStyle = nc.throw; ctx.beginPath(); ctx.arc(ctxTx,ctxTy,5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = nc.land; ctx.beginPath(); ctx.arc(ctxLx,ctxLy,6,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,.65)'; ctx.fillRect(2,2,28,16);
  ctx.fillStyle = '#dfe5ee'; ctx.font = 'bold 10px system-ui'; ctx.textBaseline = 'top';
  ctx.fillText(`×${lineup.count}`, 5, 4);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('daysSel').addEventListener('change', async () => { await load(); setUpdated(); });

function setUpdated() {
  document.getElementById('updatedAt').textContent = new Date().toLocaleTimeString();
}

(async () => { await load(); setUpdated(); })();
