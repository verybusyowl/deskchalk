<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);padding:26px 30px}
.lab{font:var(--label);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);margin-bottom:16px}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.hex{position:relative;width:46px;height:46px;display:flex;align-items:center;justify-content:center}
.hex span{position:relative;font:700 19px/1 var(--font-display);font-variant-numeric:tabular-nums}</style></head>
<body class="owl">
<div class="lab">FACEIT skill levels · 1–10 · canonical ramp</div>
<div class="row" id="r"></div>
<div style="margin-top:16px;font:var(--body-sm);color:var(--fg-3)">Grey → green → yellow → orange → red. These encode rank; never recolor them.</div>
<script>
const cols={1:'#eeeeee',2:'#1ce400',3:'#1ce400',4:'#ffc800',5:'#ffc800',6:'#ffc800',7:'#ffc800',8:'#ff6a2c',9:'#ff6a2c',10:'#ff1f3d'};
document.getElementById('r').innerHTML=Object.entries(cols).map(([n,c])=>
`<span class="hex"><svg width="46" height="46" viewBox="0 0 40 40" style="position:absolute;inset:0"><path d="M20 1.5 35.5 10.5 35.5 29.5 20 38.5 4.5 29.5 4.5 10.5Z" fill="rgba(0,0,0,.35)" stroke="${c}" stroke-width="2.5" stroke-linejoin="round"/></svg><span style="color:${c}">${n}</span></span>`).join('');
</script>
</body></html>
