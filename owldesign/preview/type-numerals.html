<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);padding:26px 30px;display:flex;gap:34px;align-items:flex-end;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:6px}.cap{font:var(--label);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3)}
.big{font:var(--stat-xl);font-variant-numeric:tabular-nums;letter-spacing:-.01em}</style></head>
<body class="owl">
<div class="stat"><span class="cap">Current ELO</span><span class="big" style="color:var(--fg-1)">1,319</span></div>
<div class="stat"><span class="cap">K / D</span><span class="big" style="color:var(--win)">1.07</span></div>
<div class="stat"><span class="cap">ELO change</span><span class="big" style="color:var(--loss)">−297</span></div>
<div class="stat"><span class="cap">Win rate</span><span class="big" style="color:var(--heat-bright)">51%</span></div>
<div style="flex-basis:100%;font:var(--body-sm);color:var(--fg-3)">Numerals are the heroes — Chakra Petch 700, tabular figures, tight leading. Deltas signed &amp; colored.</div>
</body></html>
