<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);padding:26px 30px;display:flex;flex-direction:column;gap:18px}
.lab{font:var(--label);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);margin-bottom:9px}
.row{display:flex;gap:10px}.sw{flex:1;height:62px;border-radius:var(--r-md);display:flex;align-items:flex-end;padding:8px;font:var(--mono-sm)}</style></head>
<body class="owl">
<div>
<div class="lab">Brand · electric mint — the signal color</div>
<div class="row">
<div class="sw" style="background:var(--brand-deep);color:var(--brand-bright)">deep</div>
<div class="sw" style="background:var(--brand-dim);color:var(--brand-fg)">dim</div>
<div class="sw" style="background:var(--brand);color:var(--brand-fg)">brand #19e59b</div>
<div class="sw" style="background:var(--brand-bright);color:var(--brand-fg)">bright</div>
</div></div>
<div>
<div class="lab">Heat · orange — ELO, streaks, alerts</div>
<div class="row">
<div class="sw" style="background:var(--heat-dim);color:var(--heat-fg)">dim</div>
<div class="sw" style="background:var(--heat);color:var(--heat-fg)">heat #ff6a2c</div>
<div class="sw" style="background:var(--heat-bright);color:var(--heat-fg)">bright</div>
<div class="sw" style="background:var(--heat-soft);color:var(--heat-bright);border:1px solid var(--heat-line)">soft wash</div>
</div></div>
</body></html>
