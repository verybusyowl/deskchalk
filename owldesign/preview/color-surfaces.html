<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);padding:26px 30px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.sw{height:74px;border-radius:var(--r-md);border:1px solid var(--line-2);display:flex;align-items:flex-end;padding:8px}
.sw span{font:var(--mono-sm);color:var(--fg-2)}.lab{font:var(--label);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);margin-bottom:12px}</style></head>
<body class="owl">
<div class="lab">Surface ramp · cool near-black</div>
<div class="grid">
<div class="sw" style="background:var(--bg-0)"><span>bg-0</span></div>
<div class="sw" style="background:var(--bg-1)"><span>bg-1</span></div>
<div class="sw" style="background:var(--bg-2)"><span>bg-2</span></div>
<div class="sw" style="background:var(--bg-3)"><span>bg-3</span></div>
<div class="sw" style="background:var(--bg-4)"><span>bg-4</span></div>
<div class="sw" style="background:var(--bg-5)"><span>bg-5</span></div>
</div>
<div style="margin-top:14px;font:var(--body-sm);color:var(--fg-3)">Depth is built by stepping the ramp, not by shadows. Never pure black, never warm.</div>
</body></html>
