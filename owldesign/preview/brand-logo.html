<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);padding:26px 30px;display:flex;align-items:center;gap:40px;flex-wrap:wrap}
.wm{display:flex;align-items:center;gap:12px;font:700 24px/1 var(--font-display);color:var(--fg-1);letter-spacing:-.01em}
.chip{display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:var(--r-md)}</style></head>
<body class="owl">
<div class="chip" style="background:var(--bg-3);border:1px solid var(--line-2)"><img src="../assets/owl-mark.svg" width="42" height="42"></div>
<div class="chip" style="background:var(--brand)"><img src="../assets/owl-mark.svg" width="42" height="42" style="filter:brightness(0) saturate(100%) invert(6%) sepia(20%) saturate(900%) hue-rotate(110deg)"></div>
<div class="wm"><img src="../assets/owl-mark.svg" width="40" height="40">OWL<span style="color:var(--brand)">.</span>COACH</div>
<div style="flex-basis:100%;font:var(--body-sm);color:var(--fg-3)">Owl eyes as crosshair reticles. Mint on dark; inverts to bg-0 on a mint fill. Wordmark: Chakra Petch 700, mint period.</div>
</body></html>
