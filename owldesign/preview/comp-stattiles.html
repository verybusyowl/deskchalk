<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg-1)}#root{padding:26px 30px}</style></head>
<body class="owl"><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../ui_kits/_shared/icons.js"></script>
<script type="text/babel" src="../ui_kits/_shared/primitives.jsx"></script>
<script type="text/babel" src="../ui_kits/_shared/charts.jsx"></script>
<script type="text/babel">
function Demo(){return <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
  <StatTile label="K / D" value="1.07" spark={[1.1,.9,1.2,1.0,.9,1.18,1.3,1.07]} sparkColor="auto" icon="crosshair"/>
  <StatTile label="Avg swing" value="-0.85" tone="loss" spark={[-.2,.4,-.9,.3,-1.4,.6,-.85]} sparkColor="var(--loss)" icon="activity"/>
  <StatTile label="Consistency" value="80%" tone="win" icon="gauge"
    ring={<svg width="40" height="40" style={{transform:'rotate(-90deg)'}}><circle cx="20" cy="20" r="15" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="4"/><circle cx="20" cy="20" r="15" fill="none" stroke="var(--win)" strokeWidth="4" strokeLinecap="round" strokeDasharray={2*Math.PI*15} strokeDashoffset={2*Math.PI*15*0.2}/></svg>}/>
  <StatTile label="Win rate" value="51%" cut sub={<span style={{font:'var(--ui-sm)',color:'var(--fg-3)'}}>488 matches</span>} icon="award"/>
</div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
