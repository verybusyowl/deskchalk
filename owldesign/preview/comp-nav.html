<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel">
const items=[{id:'coach',icon:'target',label:'Coach'},{id:'track',icon:'track',label:'Track'},{id:'matches',icon:'swords',label:'Matches'}];
function Demo(){const[a,setA]=React.useState('coach');return <div style={{maxWidth:240}}>
  {items.map(i=><NavItem key={i.id} item={i} active={a===i.id} onClick={()=>setA(i.id)}/>)}
  <div style={{font:'var(--body-sm)',color:'var(--fg-3)',marginTop:12}}>Active = mint edge bar + soft wash + mint glyph. Hover steps the surface up.</div>
</div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
