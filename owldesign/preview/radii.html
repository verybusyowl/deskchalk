<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);padding:26px 30px}
.lab{font:var(--label);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);margin-bottom:16px}
.row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
.b{width:66px;height:52px;background:var(--bg-4);border:1px solid var(--line-3)}
.cap{font:var(--mono-sm);color:var(--fg-3);margin-top:8px;text-align:center}</style></head>
<body class="owl">
<div class="lab">Corner radii &amp; the tactical cut</div>
<div class="row">
<div><div class="b" style="border-radius:var(--r-xs)"></div><div class="cap">xs 3</div></div>
<div><div class="b" style="border-radius:var(--r-sm)"></div><div class="cap">sm 5</div></div>
<div><div class="b" style="border-radius:var(--r-md)"></div><div class="cap">md 8</div></div>
<div><div class="b" style="border-radius:var(--r-lg)"></div><div class="cap">lg 12</div></div>
<div><div class="b" style="border-radius:var(--r-pill);width:84px"></div><div class="cap">pill</div></div>
<div><div class="b cut-corner" style="border-color:var(--brand-line)"></div><div class="cap" style="color:var(--brand)">cut-corner</div></div>
</div>
<div style="margin-top:16px;font:var(--body-sm);color:var(--fg-3)">Radii stay restrained. The cut-corner is the signature flourish — 1–2 per view, on hero tiles &amp; primary CTA.</div>
</body></html>
