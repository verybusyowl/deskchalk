<!-- @dsCard group="Type" viewport="700x180" name="Chakra Petch — display & numerals" subtitle="Broadcast voice: headings, big numbers, UI chrome" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-1)}
  .cap{font-family:var(--font-display);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:12px}
  .big{font-family:var(--font-display);font-weight:700;color:var(--text-1);line-height:1;letter-spacing:-.01em}
  .row{display:flex;align-items:baseline;gap:24px;flex-wrap:wrap}
  .stat{font-family:var(--font-display);font-weight:700;font-variant-numeric:tabular-nums;color:var(--mint);line-height:1}
</style></head><body>
<div class="cap">Chakra Petch · 'Chakra Petch'</div>
<div class="big" style="font-size:44px;margin-bottom:16px">You're dying untraded.</div>
<div class="row">
  <span class="stat" style="font-size:56px">71<span style="font-size:24px;color:var(--text-3)">%</span></span>
  <span class="stat" style="font-size:40px;color:var(--text-1)">1.18</span>
  <span class="stat" style="font-size:40px;color:var(--orange)">1350</span>
  <span style="font-family:var(--font-display);font-weight:500;color:var(--text-2);font-size:17px">Card title · medium 500</span>
</div>
</body></html>
