<!-- @dsCard group="Type" viewport="700x150" name="Tracked labels & scale" subtitle="The signature .14em uppercase label + type scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-1);display:flex;gap:40px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:11px}
  .lbl{font-family:var(--font-display);font-weight:600;text-transform:uppercase;color:var(--text-3)}
  .scale{display:flex;align-items:baseline;gap:10px}
  .sz{font-family:var(--font-mono);font-size:10px;color:var(--text-4);width:34px}
  .ex{font-family:var(--font-display);font-weight:600;color:var(--text-1)}
</style></head><body>
<div class="col">
  <span class="lbl" style="font-size:11px;letter-spacing:.14em;color:var(--mint)">● Today's Focus</span>
  <span class="lbl" style="font-size:11px;letter-spacing:.14em">Coaching insights</span>
  <span class="lbl" style="font-size:10px;letter-spacing:.14em">Map fundamentals</span>
  <span class="lbl" style="font-size:11px;letter-spacing:.04em;color:var(--text-2)">Wide · .04em</span>
</div>
<div class="col">
  <div class="scale"><span class="sz">56</span><span class="ex" style="font-size:34px">4xl verdict #</span></div>
  <div class="scale"><span class="sz">28</span><span class="ex" style="font-size:24px">2xl page title</span></div>
  <div class="scale"><span class="sz">17</span><span class="ex" style="font-size:17px">lg card title</span></div>
  <div class="scale"><span class="sz">15</span><span class="ex" style="font-size:15px;font-family:var(--font-body);font-weight:400;color:var(--text-2)">md body</span></div>
</div>
</body></html>
