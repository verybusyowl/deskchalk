<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid — card padding 16/20, section gap 24" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-1);display:flex;align-items:flex-end;gap:14px}
  .u{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--mint);border-radius:3px;width:100%}
  .box{width:30px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--text-3)}
  .px{font-family:var(--font-mono);font-size:9px;color:var(--text-4)}
</style></head><body>
<div class="box"><span class="bar" style="height:4px"></span><span class="n">1</span><span class="px">4</span></div>
<div class="box"><span class="bar" style="height:8px"></span><span class="n">2</span><span class="px">8</span></div>
<div class="box"><span class="bar" style="height:12px"></span><span class="n">3</span><span class="px">12</span></div>
<div class="box"><span class="bar" style="height:16px"></span><span class="n">4</span><span class="px">16</span></div>
<div class="box"><span class="bar" style="height:20px"></span><span class="n">5</span><span class="px">20</span></div>
<div class="box"><span class="bar" style="height:24px"></span><span class="n">6</span><span class="px">24</span></div>
<div class="box"><span class="bar" style="height:32px"></span><span class="n">7</span><span class="px">32</span></div>
<div class="box"><span class="bar" style="height:40px"></span><span class="n">8</span><span class="px">40</span></div>
<div class="box"><span class="bar" style="height:48px"></span><span class="n">9</span><span class="px">48</span></div>
<div class="box"><span class="bar" style="height:64px"></span><span class="n">10</span><span class="px">64</span></div>
</body></html>
