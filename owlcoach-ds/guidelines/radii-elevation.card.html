<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & elevation" subtitle="Esports-sharp corners · borders over shadows · accent glow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-1);display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .b{width:96px;height:84px;background:var(--surface-1);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:var(--inset-top)}
  .n{font-family:var(--font-display);font-size:11px;font-weight:600;color:var(--text-1)}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--text-4)}
</style></head><body>
<div class="b" style="border-radius:var(--radius-xs)"><span class="n">xs</span><span class="px">4px</span></div>
<div class="b" style="border-radius:var(--radius-sm)"><span class="n">sm</span><span class="px">6px</span></div>
<div class="b" style="border-radius:var(--radius-md)"><span class="n">md · card</span><span class="px">10px</span></div>
<div class="b" style="border-radius:var(--radius-lg)"><span class="n">lg · hero</span><span class="px">14px</span></div>
<div class="b" style="border-radius:var(--radius-md);box-shadow:var(--shadow-pop)"><span class="n">pop shadow</span><span class="px">float</span></div>
<div class="b" style="border-radius:var(--radius-md);box-shadow:var(--glow-orange);border-color:var(--orange-line)"><span class="n">accent glow</span><span class="px">ELO ring</span></div>
</body></html>
