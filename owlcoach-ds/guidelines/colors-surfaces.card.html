<!-- @dsCard group="Colors" viewport="700x150" name="Surface ramp" subtitle="Cool near-black ramp — depth from borders, not shadow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-1)}
  .row{display:flex;gap:8px}
  .sw{flex:1;height:84px;border-radius:var(--radius-sm);border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;padding:9px}
  .nm{font-family:var(--font-display);font-size:11px;font-weight:600;color:var(--text-1);letter-spacing:.02em}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--text-3)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--bg-0)"><span class="nm">bg-0</span><span class="hx">#0b0e12</span></div>
  <div class="sw" style="background:var(--bg-1)"><span class="nm">bg-1</span><span class="hx">#0e1217</span></div>
  <div class="sw" style="background:var(--surface-1)"><span class="nm">surface-1</span><span class="hx">#141a21</span></div>
  <div class="sw" style="background:var(--surface-2)"><span class="nm">surface-2</span><span class="hx">#1a212a</span></div>
  <div class="sw" style="background:var(--surface-3)"><span class="nm">surface-3</span><span class="hx">#232c36</span></div>
  <div class="sw" style="background:var(--surface-4)"><span class="nm">surface-4</span><span class="hx">#2c3742</span></div>
</div>
</body></html>
