<!-- @dsCard group="Colors" viewport="700x190" name="Brand accents — Mint & Orange" subtitle="Mint = good/win/improvement · Orange = heat/ELO/regression" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-1);display:flex;gap:24px;flex-wrap:wrap}
  .ramp{display:flex;flex-direction:column;gap:8px}
  .swatches{display:flex;gap:8px}
  .sw{width:104px;height:64px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border:1px solid var(--line)}
  .nm{font-family:var(--font-display);font-size:11px;font-weight:600;color:#07120c;letter-spacing:.02em}
  .hx{font-family:var(--font-mono);font-size:10px;color:rgba(7,18,12,.7)}
  .cap{font-family:var(--font-display);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3)}
  .dark .nm{color:#fff}.dark .hx{color:rgba(255,255,255,.75)}
</style></head><body>
<div class="ramp">
  <span class="cap">Mint · brand / good</span>
  <div class="swatches">
    <div class="sw" style="background:var(--mint-bright)"><span class="nm">bright</span><span class="hx">#3cffb4</span></div>
    <div class="sw" style="background:var(--mint)"><span class="nm">mint</span><span class="hx">#19e59b</span></div>
    <div class="sw" style="background:var(--mint-dim)"><span class="nm">dim</span><span class="hx">#12a673</span></div>
    <div class="sw dark" style="background:var(--mint-ghost);border-color:var(--mint-line)"><span class="nm" style="color:var(--mint)">ghost</span><span class="hx" style="color:var(--mint)">12% tint</span></div>
  </div>
</div>
<div class="ramp">
  <span class="cap">Orange · heat / ELO / regression</span>
  <div class="swatches">
    <div class="sw" style="background:var(--orange-bright)"><span class="nm">bright</span><span class="hx">#ff8a52</span></div>
    <div class="sw" style="background:var(--orange)"><span class="nm">orange</span><span class="hx">#ff6a2c</span></div>
    <div class="sw" style="background:var(--orange-dim)"><span class="nm">dim</span><span class="hx">#cc4f1c</span></div>
    <div class="sw dark" style="background:var(--orange-ghost);border-color:var(--orange-line)"><span class="nm" style="color:var(--orange-bright)">ghost</span><span class="hx" style="color:var(--orange-bright)">12% tint</span></div>
  </div>
</div>
</body></html>
