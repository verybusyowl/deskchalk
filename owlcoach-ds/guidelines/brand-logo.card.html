<!-- @dsCard group="Brand" viewport="700x200" name="Owl-mark & wordmark" subtitle="Eyes-as-scope owl — mint eyes, orange beak, on dark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-1);display:flex;align-items:center;gap:46px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:14px;align-items:center}
  .cap{font-family:var(--font-display);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-4)}
  .chip{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-md);padding:18px;display:flex;align-items:center;justify-content:center}
  .wm{display:flex;align-items:center;gap:12px}
  .wt{font-family:var(--font-display);font-weight:700;font-size:26px;letter-spacing:.04em;color:var(--text-1)}
</style></head><body>
<div class="col">
  <div class="chip"><img src="../assets/owl-mark.svg" width="72" height="72" alt="owl mark"></div>
  <span class="cap">Mark</span>
</div>
<div class="col">
  <div class="chip"><div class="wm"><img src="../assets/owl-mark.svg" width="40" height="40" alt=""><span class="wt">OWL<span style="color:var(--mint)">.</span>COACH</span></div></div>
  <span class="cap">Lockup</span>
</div>
<div class="col">
  <div class="chip" style="background:var(--mint);padding:14px"><img src="../assets/owl-mark.svg" width="40" height="40" alt="" style="filter:grayscale(1) brightness(0.15)"></div>
  <span class="cap">On mint</span>
</div>
</body></html>
