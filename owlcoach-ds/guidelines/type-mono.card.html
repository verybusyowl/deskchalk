<!-- @dsCard group="Type" viewport="700x180" name="JetBrains Mono — stats & tables" subtitle="Tabular numerals for deltas, columns, raw data" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-1)}
  .cap{font-family:var(--font-display);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:14px}
  table{border-collapse:collapse;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:13px;width:100%;max-width:540px}
  td,th{text-align:right;padding:6px 14px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left;color:var(--text-2);font-family:var(--font-display);font-weight:600}
  th{color:var(--text-4);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
  td{color:var(--text-1)}
  .up{color:var(--mint)}.dn{color:var(--orange-bright)}
</style></head><body>
<div class="cap">JetBrains Mono · 'JetBrains Mono'</div>
<table>
  <tr><th>Metric</th><th>Value</th><th>Δ vs prev 10</th></tr>
  <tr><td>K / D</td><td>1.18</td><td class="up">▲ 0.09</td></tr>
  <tr><td>ADR</td><td>78.4</td><td class="up">▲ 4.2</td></tr>
  <tr><td>Untraded %</td><td>71%</td><td class="up">▼ 6</td></tr>
  <tr><td>Time-to-dmg</td><td>612ms</td><td class="dn">▲ 12</td></tr>
</table>
</body></html>
