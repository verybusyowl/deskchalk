<!-- @dsCard group="Components" viewport="700x320" name="Data — Stats, Trends, Sparklines, Baseline" subtitle="Metric tiles, trend deltas, progress-vs-baseline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .panel { background: var(--surface-1); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
  .grp-label { font-family: var(--font-display); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-4); margin-bottom: 10px; }
  .trends { display: flex; gap: 18px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StatCard, TrendIndicator, Sparkline, BaselineProgress } = window.OWLCOACHDesignSystem_013434;
  function Demo() {
    return (
      <div>
        <div className="grid">
          <StatCard label="K / D" value="1.18" delta={+0.09} goodDirection="up" spark={[1.0,1.05,0.98,1.1,1.06,1.18]} />
          <StatCard label="ADR" value="78.4" delta={+4.2} goodDirection="up" spark={[70,72,69,74,76,78]} />
          <StatCard label="Win %" value="52%" unit="%" delta={-3} goodDirection="up" spark={[58,55,54,53,52,52]} />
          <StatCard label="Untraded death" value="71%" unit="%" delta={-6} goodDirection="down" spark={[82,80,77,74,72,71]} />
        </div>
        <div className="panel" style={{marginBottom: 18}}>
          <div className="grp-label">Trend indicators — colour = meaning, not direction</div>
          <div className="trends">
            <span>K/D <TrendIndicator delta={+0.12} goodDirection="up" /></span>
            <span>HS% <TrendIndicator delta={-4} unit="%" goodDirection="up" /></span>
            <span>Untraded <TrendIndicator delta={-7} unit="%" goodDirection="down" /></span>
            <span>Time-to-dmg <TrendIndicator delta={+12} unit="ms" goodDirection="down" /></span>
            <span>Flat <TrendIndicator delta={0} /></span>
            <span>Sparkline <Sparkline data={[3,5,4,6,5,8,7,9]} tone="good" /></span>
          </div>
        </div>
        <div className="panel">
          <BaselineProgress baseline={82} current={71} target={55} unit="%" goodDirection="down" label="Untraded death % vs baseline" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
